services:
  postgresql:
    image: postgres:16
    container_name: sc-postgresql
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: spring_collector
    ports:
      - "5432:5432"
    volumes:
      - .data/postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d spring_collector"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sc-redis
    ports:
      - "6379:6379"
    volumes:
      - .data/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: sc-influxdb
    mem_limit: 1g
    mem_reservation: 512m
    memswap_limit: 1g
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: spring-watch
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sw-token-2024
    volumes:
      - .data/influxdb_data:/var/lib/influxdb2
      # 不挂载 influxdb.conf:InfluxDB 2.7 entrypoint 收到 INFLUXD_CONFIG_PATH 时
      # 会按 1.x 格式读 config,本配置文件的 key 跟 1.x 一样,被 2.x 判定为 1.x flag 而拒启动
      # 改用 InfluxDB 2.x 默认配置,内存由容器 mem_limit: 1g 物理兜底(白皮书 §0.6)
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.3.0
    user: "0:0"
    container_name: sc-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
      # M-KafkaHealth: 把 broker 的 JMX 端口也暴露到宿主,让 spring-watch 进程的
      # KafkaBrokerJmxMonitor 通过 RMI 连进来拉 BrokerTopicMetrics / ReplicaManager / JVM
      - "9999:9999"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # M-KafkaHealth: 启用 broker JMX,供 spring-watch 的 KafkaBrokerJmxMonitor 连入
      #  - rmi.port=9999  关键:JMX 默认还会再开一个随机端口做 RMI callback,那个端口没 publish,
      #    客户端拉 stub 后再连会卡死。把 callback 端口也锁在 9999,只需 expose 一个端口
      #  - java.rmi.server.hostname=0.0.0.0  容器内 RMI registry 绑 0.0.0.0,
      #    宿主机/其它容器连 localhost:9999 / sc-kafka:9999 都能通
      #  - local.only=false  允许远程连接(同主机/同网络,认证靠 authenticate=false 兜底)
      #  - 9999 端口已在 ports 里 expose 给宿主机
      KAFKA_JMX_OPTS: >-
        -Dcom.sun.management.jmxremote
        -Dcom.sun.management.jmxremote.port=9999
        -Dcom.sun.management.jmxremote.rmi.port=9999
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Dcom.sun.management.jmxremote.local.only=false
        -Djava.rmi.server.hostname=0.0.0.0
    volumes:
      - .data/kafka_data:/var/lib/kafka/data

volumes:
  postgresql_data:
  redis_data:
  influxdb_data:
  kafka_data: