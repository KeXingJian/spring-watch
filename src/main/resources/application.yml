server:
  port: 8080

spring-watch:
  collector:
    pool-size: 32 # 采集线程池大小
    per-host-concurrent: 32 # 同一目标主机的最大并发数
    jitter-percent: 20 # 采集时间抖动百分比（避免雪崩）
    http:
      connect-timeout-ms: 3000 # HTTP 连接超时（毫秒）
      read-timeout-ms: 10000 # HTTP 读取超时（毫秒）
      max-body-bytes: 4194304 # Agent HTTP 响应体大小上限（字节，P0-2，默认 4MB）
    retry:
      drainer-count: 2 # 重试排空线程数
      max-attempts: 5 # 单次请求最大重试次数
      max-queue-size: 1000 # 重试队列最大容量
  agent:
    prometheus-host: 0.0.0.0 # Prometheus Agent 监听地址
  alert:
    enabled: true # 是否开启告警
    mail:
      from: 2787901285@qq.com # 发件人邮箱
      from-name: spring-watch # 发件人显示名称
    state-store:
      ttl-hours: 24 # 告警状态存储 TTL（小时）
    rule-cache:
      refresh-interval-ms: 30000 # 告警规则缓存刷新间隔（毫秒）
    executor:
      pool-size: 8 # 告警执行线程池大小（虚拟线程并发上限）
    scan:
      interval-ms: 5000 # 扫描间隔（毫秒）
      batch-size: 200 # 每批扫描条数
    history:
      retention-days: 90 # 告警历史保留天数（P0-5）
  log:
    env: dev # 当前环境标识（影响链路关联等行为）
    dedup:
      window-seconds: 60 # 去重窗口（秒）
      count-ttl-seconds: 3600 # 计数缓存 TTL（秒）
      flush-interval-ms: 30000 # 计数刷新间隔（毫秒）
    anomaly:
      rate-ttl-seconds: 600 # 异常率窗口 TTL（秒）
      pattern-ttl-hours: 168 # 异常模式 TTL（小时）
      min-base-rate: 0.01 # 触发异常的最小基准率
    alert:
      error-rate-window-seconds: 60 # 错误率计算窗口（秒）
      error-rate-interval-ms: 60000 # 错误率计算间隔（毫秒）
  infra-metrics:
    enabled: true # 启用三栈基础设施指标采集（InfluxDB /metrics 端点 + Kafka lag）
    poll-interval-sec: 30 # 采集周期（秒）
    request-timeout-ms: 5000 # HTTP 请求超时
  influxdb:
    admin-token: sw-token-2024 # 调 InfluxDB /metrics 端点用的 token（需含读权限）
  kafka:
    lag-monitor:
      enabled: true
      group-id: spring-watch # 默认 group,与 spring.kafka.consumer.group-id 一致
      topics: monitor-metrics,monitor-logs,monitor-heartbeat
      # 三个 topic 的实际消费者 group 都不是默认的 spring-watch(都是各自的 -writer 群组),
      # 这里给每个 topic 单独指定对应的 consumer group,lag 才算得准。没列的 topic 用上面的 group-id。
      groups:
        monitor-metrics: spring-watch-metric-writer
        monitor-logs: spring-watch-log-writer
        monitor-heartbeat: spring-watch-heartbeat-writer
      poll-interval-sec: 30
    health-monitor:
      enabled: true # M-KafkaHealth: 集群健康 + producer 计数采集
      poll-interval-sec: 30 # AdminClient 拉集群状态,30s 一次够用
    producer-jmx:
      enabled: true # M-KafkaHealth: spring-watch 自己这个 producer 内部 JMX 指标(record-send-rate / batch-size-avg / compression-rate 等)
      poll-interval-sec: 30
    broker-jmx:
      enabled: true # M-KafkaHealth: 连 broker JMX 拉 BrokerTopicMetrics / ReplicaManager / ControllerStats / JVM
      poll-interval-sec: 30
      connect-timeout-sec: 5
      # url 不配 = 跳过;配上形如 service:jmx:rmi:///jndi/rmi://broker-host:9999/jmxrmi
      # broker 启动需加 -Dcom.sun.management.jmxremote.port=9999 等参数
      url: ${KAFKA_BROKER_JMX_URL:}
      username: ${KAFKA_BROKER_JMX_USER:}
      password: ${KAFKA_BROKER_JMX_PASSWORD:}
    partition-utilization:
      enabled: true # M-PartitionUtil: 按 topic × partition 维度采集 produced_rate / consumed_rate / lag,1~2 周调研后决定 partition 数是否需要收敛
      poll-interval-sec: 30
      topics: monitor-metrics,monitor-logs,monitor-heartbeat
      group-id: spring-watch
    fallback-queue:
      capacity: 10000 # 兜底内存队列容量（P1-1: 50000 → 10000）
      max-payload-bytes: 16384 # 单条 payload 截断阈值（字节，P1-1）
      drain-interval-ms: 5000 # 队列排空间隔（毫秒）
      send-timeout-ms: 2000 # 单条发送超时（毫秒）
      alert-threshold: 1000 # 积压告警阈值
  infra-alerts:
    enabled: true
    appid: -1 # 基础设施告警复用的 MonitorApp.appid（负数为 sentinel, CollectScheduleRegistry 会跳过）
    app-name: infra-self
    poll-interval-ms: 60000
    rules:
      - name: influxdb_tsm_cache_high
        component: influxdb
        metric: tsm1_engine.cacheSizeBytes
        op: ">"
        threshold: 200000000
        level: warning
        cooldown-seconds: 300
      - name: jvm_old_gen_high_pct
        component: springwatch
        metric: jvm.g1.oldgen.pct
        op: ">"
        threshold: 85
        level: critical
        cooldown-seconds: 300
      - name: influxdb_heap_high
        component: influxdb
        metric: go_memstats.heapInuseBytes
        op: ">"
        threshold: 800000000
        level: warning
        cooldown-seconds: 300
      - name: kafka_lag_metrics_high
        component: kafka
        metric: consumer.lag.topic
        tag:
          topic: monitor-metrics
        op: ">"
        threshold: 10000
        level: warning
        cooldown-seconds: 300
      - name: kafka_lag_logs_high
        component: kafka
        metric: consumer.lag.topic
        tag:
          topic: monitor-logs
        op: ">"
        threshold: 10000
        level: warning
        cooldown-seconds: 300
      - name: influxdb_write_queue_high
        component: springwatch
        metric: spring.watch.influxdb.write.queue.size
        op: ">"
        threshold: 15000
        level: warning
        cooldown-seconds: 300
      # M-KafkaHealth: 副本不足 partition 出现 = 集群有 broker 落后,任一 > 0 都要告警
      - name: kafka_under_replicated
        component: kafka
        metric: kafka.under_replicated_partitions
        op: ">"
        threshold: 0
        level: critical
        cooldown-seconds: 300
      # M-KafkaHealth: offline partition = 整个 partition 没 leader,producer 写入会卡/失败
      - name: kafka_offline_partitions
        component: kafka
        metric: kafka.offline_partitions
        op: ">"
        threshold: 0
        level: critical
        cooldown-seconds: 300
      # M-KafkaHealth: controller id = -1 意味着没有 active controller,集群基本不可用
      - name: kafka_no_controller
        component: kafka
        metric: kafka.controller_id
        op: "=="
        threshold: -1
        level: critical
        cooldown-seconds: 300
      # M-KafkaHealth: producer 失败累计(每个 topic 一条线)做绝对值告警,正常情况下不该涨
      - name: kafka_producer_failed_metrics
        component: kafka
        metric: kafka.producer.failed
        tag:
          topic: monitor-metrics
        op: ">"
        threshold: 100
        level: warning
        cooldown-seconds: 600
      - name: kafka_producer_failed_logs
        component: kafka
        metric: kafka.producer.failed
        tag:
          topic: monitor-logs
        op: ">"
        threshold: 100
        level: warning
        cooldown-seconds: 600
      - name: kafka_producer_failed_heartbeat
        component: kafka
        metric: kafka.producer.failed
        tag:
          topic: monitor-heartbeat
        op: ">"
        threshold: 50
        level: critical
        cooldown-seconds: 600
      # M-KafkaHealth: broker 端 JVM 堆使用率(> 80% 告警;字节数,需要看实际堆大小)
      - name: kafka_broker_jvm_heap_high
        component: kafka
        metric: broker.jvm.heap_used
        op: ">"
        threshold: 6442450944 # 6 GB,按生产 broker 堆 8 GB 算 75% 警戒线
        level: warning
        cooldown-seconds: 300
      # M-KafkaHealth: 生产失败率(消息/秒)> 1
      - name: kafka_broker_produce_failed_rate
        component: kafka
        metric: broker.produce_failed_rate
        op: ">"
        threshold: 1
        level: warning
        cooldown-seconds: 300
      # M-KafkaHealth: producer 客户端 buffer 满(> 0 表示出现过阻塞)
      - name: kafka_producer_buffer_exhausted
        component: kafka
        metric: producer.buffer_exhausted_rate
        op: ">"
        threshold: 0
        level: warning
        cooldown-seconds: 300

spring:
  application:
    name: spring-watch

  config:
    import: optional:file:.env[.properties] # 加载外部 .env 属性文件（可选）

  mail:
    host: smtp.qq.com # SMTP 服务器地址
    port: 587 # SMTP 端口
    username: 2787901285@qq.com # 登录账号
    password: ${MAIL_AUTH_CODE} # 登录授权码（从环境变量读取）
    properties:
      mail:
        smtp:
          auth: true # 启用认证
          starttls:
            enable: true # 启用 STARTTLS
            required: true # 强制要求 STARTTLS
          connectiontimeout: 5000 # 连接超时（毫秒）
          timeout: 5000 # 读超时（毫秒）
          writetimeout: 5000 # 写超时（毫秒）

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_collector # PostgreSQL JDBC 地址
    username: root # 数据库账号
    password: 123456 # 数据库密码
    driver-class-name: org.postgresql.Driver # JDBC 驱动

  jpa:
    open-in-view: false # 关闭 OSIV，避免请求级 PersistenceContext 泄漏（P0-1）
    hibernate:
      ddl-auto: none # 不由 JPA 维护表结构
    show-sql: false # 是否打印 SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # Hibernate 方言

  task:
    scheduling:
      pool:
        size: 4 # @Scheduled 调度线程数（P1-7，默认 1 串行）

  kafka:
    bootstrap-servers: localhost:9092 # Kafka Broker 地址
    consumer:
      group-id: spring-watch # 消费者组
      auto-offset-reset: earliest # 偏移量重置策略
      max-poll-records: 500 # 单次 poll 最大条数（M-WriteApiSplit: 200 → 500，与 metricsWriteApi batch-size=5000 匹配）
      fetch-min-size: 1024 # 最小拉取字节数
      fetch-max-wait: 200 # 拉取最大等待（毫秒）
      max-poll-interval-ms: 300000 # 两次 poll 最大间隔（毫秒）
    producer:
      acks: all # 副本全部确认
      compression-type: lz4 # 压缩算法
      batch-size: 65536 # 批大小（字节）
      linger-ms: 30 # 批等待时间（毫秒）
      buffer-memory: 33554432 # 客户端总缓冲（字节，P1-9: 128MB → 32MB）
      delivery-timeout-ms: 120000 # 投递总超时（毫秒）
      request-timeout-ms: 30000 # 单次请求超时（毫秒）
    listener:
      concurrency: 3 # 消费者并发数
      poll-timeout: 200 # poll 超时（毫秒）
    topics:
      metrics: monitor-metrics # 指标 topic
      logs: monitor-logs # 日志 topic
      heartbeat: monitor-heartbeat # 心跳 topic
      metrics-partitions: 3 # 指标 topic 分区数(v1.5 收敛: 12→3,白皮书 §0.5 实测后保持收敛)
      logs-partitions: 3 # 日志 topic 分区数(v1.5 收敛: 6→3)
      heartbeat-partitions: 1 # 心跳 topic 分区数(v1.5 收敛: 3→1,心跳低频)
      dlq-partitions: 1 # 死信队列分区数(v1.5 收敛: 3→1,死信极低频)
      replication-factor: 1 # 副本因子（单节点环境为 1）
    dlq:
      retry-max-attempts: 5 # 死信最大重试次数
      retry-initial-interval: 200 # 初始重试间隔（毫秒）
      retry-multiplier: 2.0 # 重试间隔倍数
      retry-max-interval: 5000 # 最大重试间隔（毫秒）

  data:
    redis:
      host: localhost # Redis 地址
      port: 6379 # Redis 端口


influxdb:
  url: http://localhost:8086 # InfluxDB 地址
  token: sw-token-2024 # 访问令牌
  org: spring-watch # 组织名
  metrics-bucket: metrics # 原始指标桶
  log-bucket: logs # 原始日志桶
  self-metrics-bucket: self_metrics # 自监控指标桶（与自监控 24h 展示对齐）
  metrics-downsample-bucket: metrics_5m # 5 分钟降采样指标桶
  log-downsample-bucket: logs_5m # 5 分钟降采样日志桶
  infra-bucket: infra_metrics # 基础设施指标桶（InfluxDB _internal + Kafka lag 等）
  retention:
    metrics-seconds: 604800 # 原始指标保留时长（秒，7 天）
    log-seconds: 259200 # 原始日志保留时长（秒，3 天）
    self-metrics-seconds: 21600 # 自监控指标保留时长（秒，6h：自监控面板只显示 24h 留 1h 够用）
    downsample-seconds: 2592000 # 降采样数据保留时长（秒，30 天）
    infra-seconds: 604800 # 基础设施指标保留时长（秒，7 天）
  downsample:
    enabled: true # 是否开启降采样
    every: 5m # 降采样执行频率
    window: 5m # 降采样窗口大小
    task-every: 1h # 任务调度频率
  write:
    batch-size: 1000 # 每批写入条数(默认,各 WriteApi 实际值见 InfluxDBConfig.java)
    flush-interval-ms: 2000 # 刷新间隔（毫秒,P1-8: 1000 → 2000）
    buffer-limit: 20000 # 内存缓冲上限（P1-8: 100000 → 20000）
    retry-interval-ms: 1000 # 写入失败重试间隔（毫秒）
    max-retries: 3 # 最大重试次数
    max-retry-delay-ms: 5000 # 单次重试最大延迟（毫秒）
    max-retry-time-ms: 60000 # 整体重试最大耗时（毫秒）
    jitter-interval-ms: 200 # 重试抖动（毫秒）

logging:
  level:
    com.springwatch: warn # 自定义包日志级别（P2-3: debug → info，避免每次评估/采样都格式化 toString）
  file:
    path: ./.log # 日志输出目录


