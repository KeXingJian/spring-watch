server:
  port: 8080

spring:
  application:
    name: spring-watch

  config:
    import:
      - classpath:application-collector.yml
      - classpath:application-alert.yml
      - classpath:application-log.yml
      - classpath:application-inflight.yml
      - classpath:application-infra.yml
      - classpath:application-influxdb.yml
      - optional:file:.env[.properties]

  mail:
    host: smtp.qq.com # SMTP 服务器地址
    port: 587 # SMTP 端口
    username: 2787901285@qq.com # 登录账号
    password: ${MAIL_AUTH_CODE} # 登录授权码（从环境变量读取）
    properties:
      mail:
        smtp:
          auth: true # 启用认证
          starttls:
            enable: true # 启用 STARTTLS
            required: true # 强制要求 STARTTLS
          connectiontimeout: 5000 # 连接超时（毫秒）
          timeout: 5000 # 读超时（毫秒）
          writetimeout: 5000 # 写超时（毫秒）

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_collector # PostgreSQL JDBC 地址
    username: root # 数据库账号
    password: 123456 # 数据库密码
    driver-class-name: org.postgresql.Driver # JDBC 驱动

  jpa:
    open-in-view: false # 关闭 OSIV，避免请求级 PersistenceContext 泄漏（P0-1）
    hibernate:
      ddl-auto: none # 不由 JPA 维护表结构
    show-sql: false # 是否打印 SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # Hibernate 方言

  task:
    scheduling:
      pool:
        size: 4 # @Scheduled 调度线程数（P1-7，默认 1 串行）

logging:
  level:
    com.springwatch: warn # 自定义包日志级别（P2-3: debug → info，避免每次评估/采样都格式化 toString）
  file:
    path: ./.log # 日志输出目录
