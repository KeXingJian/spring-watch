<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>监控应用 - spring-watch</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/common.js"></script>
    <style>
        .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .toolbar .right { margin-left: auto; }
        .app-table { background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
        .app-table table.data th { white-space: nowrap; }
        .app-table td .row-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .app-table td .heartbeat { font-size: 0.78rem; color: var(--c-text-muted); }
        .app-table td .heartbeat.stale { color: var(--c-warn); }
        .app-table td .heartbeat.dead { color: var(--c-danger); }
        .app-table td code { background: #f1f5f9; padding: 1px 6px; border-radius: 3px; font-size: 0.78rem; }
        .info-tip { color: var(--c-text-muted); font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div style="padding: 16px 20px; max-width: 1400px; margin: 0 auto;">
        <h2 style="margin: 0 0 14px 0; font-size: 1.2rem;">监控应用</h2>

        <div class="toolbar">
            <button class="btn btn-primary" id="btn-new">+ 新建应用</button>
            <span id="app-count" class="info-tip" style="margin: 0;"></span>
            <span class="right"></span>
            <button class="btn" id="btn-refresh">刷新</button>
        </div>

        <div class="app-table">
            <table class="data" id="app-table">
                <thead>
                    <tr>
                        <th style="width:48px;">ID</th>
                        <th>名称</th>
                        <th style="width:140px;">appid</th>
                        <th>endpoint</th>
                        <th style="width:60px;">端口</th>
                        <th style="width:90px;">采集间隔</th>
                        <th style="width:60px;">状态</th>
                        <th style="width:120px;">心跳</th>
                        <th style="width:60px;">标签</th>
                        <th style="width:240px;">操作</th>
                    </tr>
                </thead>
                <tbody id="app-tbody">
                    <tr><td colspan="10" class="empty-state"><div class="icon">&#128260;</div><div>加载中...</div></td></tr>
                </tbody>
            </table>
        </div>

        <p class="info-tip">appid 是被监控应用在采集端配置时使用的标识(由后端雪花算法生成,不可改)。endpoint 是 OTel Collector 或应用自身暴露的指标端点。标签会以 K=V 形式附带在所有指标上。</p>
    </div>

    <!-- 新建/编辑模态 -->
    <div class="modal-mask" id="edit-mask" style="display:none;">
        <div class="modal" style="width: 560px;">
            <div class="modal-head">
                <span id="edit-title">新建应用</span>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <label>应用名称 <span style="color:var(--c-danger);">*</span></label>
                    <input class="form" id="edit-name" placeholder="例如 mock-test">
                </div>
                <div class="form-row">
                    <label>endpoint <span style="color:var(--c-text-muted); font-weight:normal;">(OTel/Prometheus 指标端点 URL)</span></label>
                    <input class="form" id="edit-endpoint" placeholder="http://host:port">
                </div>
                <div class="form-row row-2">
                    <div>
                        <label>采集端口</label>
                        <input class="form" id="edit-port" type="number" min="1" max="65535" value="9464">
                    </div>
                    <div>
                        <label>调度类型</label>
                        <select class="form" id="edit-schedule">
                            <option value="INTERVAL">INTERVAL(按秒)</option>
                            <option value="CRON">CRON</option>
                        </select>
                    </div>
                </div>
                <div class="form-row row-2">
                    <div>
                        <label id="edit-interval-label">采集间隔(秒)</label>
                        <input class="form" id="edit-interval" type="number" min="1" value="15">
                    </div>
                    <div>
                        <label id="edit-cron-label" style="visibility:hidden;">Cron 表达式</label>
                        <input class="form" id="edit-cron" placeholder="0 */5 * * * *">
                    </div>
                </div>
                <div class="form-row">
                    <label>标签 <span style="color:var(--c-text-muted); font-weight:normal;">(JSON 格式,例:{"env":"prod","team":"infra"})</span></label>
                    <textarea class="form" id="edit-labels" rows="2" placeholder='{"env":"prod"}'></textarea>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" id="edit-save">保存</button>
            </div>
        </div>
    </div>

    <!-- OTel 配置模态 -->
    <div class="modal-mask" id="otel-mask" style="display:none;">
        <div class="modal" style="width: 720px;">
            <div class="modal-head">
                <span>OTel 采集配置</span>
                <span class="close" onclick="closeOtelModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p style="margin: 0 0 6px 0; font-size: 0.85rem;">
                    appid: <code style="background:#f1f5f9;padding:1px 6px;border-radius:3px;" id="otel-appid">-</code>
                    &nbsp;&nbsp;endpoint: <code style="background:#f1f5f9;padding:1px 6px;border-radius:3px;" id="otel-endpoint">-</code>
                </p>
                <div class="form-row">
                    <label>环境变量(env)</label>
                    <div class="code-wrap">
                        <pre id="otel-env">-</pre>
                        <button class="btn btn-sm copy-btn" onclick="copyText('otel-env')">复制</button>
                    </div>
                </div>
                <div class="form-row">
                    <label>Java Agent 启动命令(java -javaagent:...)替换 <code>/path/to/opentelemetry-javaagent.jar</code></label>
                    <div class="code-wrap">
                        <pre id="otel-cmd" class="compact">-</pre>
                        <button class="btn btn-sm copy-btn" onclick="copyText('otel-cmd')">复制</button>
                    </div>
                </div>
                <p class="info-tip">在目标应用启动脚本中加入上面的 -javaagent 参数即可,后端会按此 appid 拉取指标。修改配置后可在监控应用列表点 [刷新] 重新拉取。</p>
            </div>
            <div class="modal-foot">
                <button class="btn btn-primary" onclick="closeOtelModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const tbody = document.getElementById("app-tbody");
        const countEl = document.getElementById("app-count");
        let editing = null;
        let otelCtx = null;

        async function loadApps() {
            try {
                const apps = await SW.api.get("/api/apps");
                renderRows(apps || []);
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><div class="icon">&#9888;</div><div>加载失败: ' + SW.ui.escapeHtml(e.message) + '</div></td></tr>';
            }
        }

        function renderRows(apps) {
            countEl.textContent = "共 " + apps.length + " 个应用";
            if (apps.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><div class="icon">&#128196;</div><div>暂无应用,点击 [新建应用] 开始</div></td></tr>';
                return;
            }
                tbody.innerHTML = apps.map(a => {
                const hb = formatHeartbeat(a.lastHeartbeat);
                const labelsShort = a.labels ? '<code>' + SW.ui.escapeHtml(shortJson(a.labels)) + '</code>' : '<span style="color:var(--c-text-muted);">-</span>';
                return ''
                    + '<tr data-id="' + a.id + '">'
                    + '<td>' + a.id + '</td>'
                    + '<td><strong>' + SW.ui.escapeHtml(a.appName) + '</strong></td>'
                    + '<td><code>' + SW.ui.escapeHtml(String(a.appid)) + '</code></td>'
                    + '<td>' + (a.endpoint ? SW.ui.escapeHtml(a.endpoint) : '<span style="color:var(--c-text-muted);">-</span>') + '</td>'
                    + '<td>' + (a.metricsPort || "-") + '</td>'
                    + '<td>' + formatSchedule(a) + '</td>'
                    + '<td><span class="badge badge-' + (a.status === "active" ? "active" : "paused") + '">' + SW.ui.escapeHtml(a.status || "-") + '</span></td>'
                    + '<td><span class="heartbeat ' + hb.cls + '">' + hb.text + '</span></td>'
                    + '<td>' + labelsShort + '</td>'
                    + '<td><div class="row-actions">'
                    + '<button class="btn btn-sm" data-act="otel">配置</button>'
                    + '<button class="btn btn-sm" data-act="edit">编辑</button>'
                    + (a.status === "active"
                        ? '<button class="btn btn-sm" data-act="pause">暂停</button>'
                        : '<button class="btn btn-sm" data-act="resume">恢复</button>')
                    + '<button class="btn btn-sm" data-act="del" style="color:var(--c-danger);">删除</button>'
                    + '</div></td>'
                    + '</tr>';
            }).join("");
        }

        function formatSchedule(a) {
            if (a.scheduleType === "CRON") return 'CRON ' + (a.cronExpression || "-");
            return (a.scrapeInterval || 15) + ' s';
        }

        function formatHeartbeat(t) {
            if (!t) return { text: "无", cls: "dead" };
            const ms = Date.now() - new Date(t).getTime();
            if (ms < 0 || ms < 60000) return { text: "刚刚", cls: "" };
            if (ms < 300000) return { text: Math.floor(ms / 60000) + " 分钟前", cls: "" };
            if (ms < 3600000) return { text: Math.floor(ms / 60000) + " 分钟前", cls: "stale" };
            return { text: Math.floor(ms / 3600000) + " 小时前", cls: "dead" };
        }

        function shortJson(s) {
            try { const o = JSON.parse(s); const keys = Object.keys(o); if (keys.length === 0) return "{}"; if (keys.length <= 2) return JSON.stringify(o); return keys.slice(0, 2).map(k => k + "=" + o[k]).join(",") + "…"; }
            catch (e) { return s.length > 20 ? s.slice(0, 20) + "…" : s; }
        }

        /* 列表操作委托 */
        tbody.addEventListener("click", async (e) => {
            const btn = e.target.closest("button[data-act]");
            if (!btn) return;
            const tr = btn.closest("tr");
            const id = parseInt(tr.dataset.id, 10);
            const act = btn.dataset.act;
            if (act === "edit") openEditModal(id);
            else if (act === "otel") openOtelModal(id);
            else if (act === "pause") await doAction(() => SW.api.post("/api/apps/" + id + "/pause"), "已暂停");
            else if (act === "resume") await doAction(() => SW.api.post("/api/apps/" + id + "/resume"), "已恢复");
            else if (act === "del") await doDelete(id);
        });

        async function doAction(fn, okMsg) {
            try { await fn(); SW.ui.toast(okMsg, "success"); await loadApps(); }
            catch (e) { SW.ui.toast("操作失败: " + e.message, "error"); }
        }

        async function doDelete(id) {
            if (!confirm("确定删除该应用?该操作不可恢复,关联的指标数据将不再被采集。")) return;
            try { await SW.api.del("/api/apps/" + id); SW.ui.toast("已删除", "success"); await loadApps(); }
            catch (e) { SW.ui.toast("删除失败: " + e.message, "error"); }
        }

        /* 新建 / 编辑 */
        document.getElementById("btn-new").addEventListener("click", () => openEditModal(null));
        document.getElementById("edit-schedule").addEventListener("change", (e) => {
            const isCron = e.target.value === "CRON";
            document.getElementById("edit-cron-label").style.visibility = isCron ? "visible" : "hidden";
            document.getElementById("edit-cron").style.visibility = isCron ? "visible" : "hidden";
            document.getElementById("edit-interval-label").textContent = isCron ? "(INTERVAL 模式才生效)" : "采集间隔(秒)";
            document.getElementById("edit-interval").disabled = isCron;
        });

        async function openEditModal(id) {
            editing = id;
            document.getElementById("edit-title").textContent = id ? "编辑应用" : "新建应用";
            document.getElementById("edit-id").value = id || "";
            if (id) {
                const apps = await SW.api.get("/api/apps");
                const a = (apps || []).find(x => x.id === id);
                if (!a) { SW.ui.toast("应用不存在", "error"); return; }
                document.getElementById("edit-name").value = a.appName || "";
                document.getElementById("edit-endpoint").value = a.endpoint || "";
                document.getElementById("edit-port").value = a.metricsPort || 9464;
                document.getElementById("edit-schedule").value = a.scheduleType || "INTERVAL";
                document.getElementById("edit-interval").value = a.scrapeInterval || 15;
                document.getElementById("edit-cron").value = a.cronExpression || "";
                document.getElementById("edit-labels").value = a.labels || "";
                document.getElementById("edit-schedule").dispatchEvent(new Event("change"));
            } else {
                document.getElementById("edit-name").value = "";
                document.getElementById("edit-endpoint").value = "";
                document.getElementById("edit-port").value = 9464;
                document.getElementById("edit-schedule").value = "INTERVAL";
                document.getElementById("edit-interval").value = 15;
                document.getElementById("edit-cron").value = "";
                document.getElementById("edit-labels").value = "";
                document.getElementById("edit-schedule").dispatchEvent(new Event("change"));
            }
            document.getElementById("edit-mask").style.display = "flex";
            setTimeout(() => document.getElementById("edit-name").focus(), 50);
        }
        function closeEditModal() { document.getElementById("edit-mask").style.display = "none"; editing = null; }

        document.getElementById("edit-save").addEventListener("click", async () => {
            const name = document.getElementById("edit-name").value.trim();
            if (!name) { SW.ui.toast("应用名称不能为空", "error"); return; }
            const labelsRaw = document.getElementById("edit-labels").value.trim();
            if (labelsRaw) {
                try { JSON.parse(labelsRaw); }
                catch (e) { SW.ui.toast("标签不是合法 JSON: " + e.message, "error"); return; }
            }
            const body = {
                appName: name,
                endpoint: document.getElementById("edit-endpoint").value.trim() || null,
                metricsPort: parseInt(document.getElementById("edit-port").value, 10) || 9464,
                scheduleType: document.getElementById("edit-schedule").value,
                scrapeInterval: parseInt(document.getElementById("edit-interval").value, 10) || 15,
                cronExpression: document.getElementById("edit-cron").value.trim() || null,
                labels: labelsRaw || null
            };
            try {
                if (editing) {
                    await SW.api.put("/api/apps/" + editing, body);
                    SW.ui.toast("已更新", "success");
                } else {
                    await SW.api.post("/api/apps", body);
                    SW.ui.toast("已创建", "success");
                }
                closeEditModal();
                await loadApps();
            } catch (e) {
                SW.ui.toast("保存失败: " + e.message, "error");
            }
        });

        /* OTel 配置 */
        async function openOtelModal(id) {
            try {
                const cfg = await SW.api.get("/api/apps/" + id + "/otel-config");
                otelCtx = cfg;
                document.getElementById("otel-appid").textContent = cfg.appid || "-";
                document.getElementById("otel-endpoint").textContent = cfg.endpoint || "-";
                document.getElementById("otel-env").textContent = (cfg.env || []).join("\n");
                document.getElementById("otel-cmd").textContent = cfg.command || "-";
                document.getElementById("otel-mask").style.display = "flex";
            } catch (e) {
                SW.ui.toast("加载 OTel 配置失败: " + e.message, "error");
            }
        }
        function closeOtelModal() { document.getElementById("otel-mask").style.display = "none"; otelCtx = null; }
        function copyText(elId) {
            const text = document.getElementById(elId).textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => SW.ui.toast("已复制", "success"),
                    () => fallbackCopy(text));
            } else fallbackCopy(text);
        }
        function fallbackCopy(text) {
            const ta = document.createElement("textarea");
            ta.value = text; document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); SW.ui.toast("已复制", "success"); }
            catch (e) { SW.ui.toast("复制失败", "error"); }
            document.body.removeChild(ta);
        }

        /* 顶部按钮 */
        document.getElementById("btn-refresh").addEventListener("click", loadApps);

        /* 关闭模态:点击遮罩 */
        document.getElementById("edit-mask").addEventListener("click", (e) => { if (e.target.id === "edit-mask") closeEditModal(); });
        document.getElementById("otel-mask").addEventListener("click", (e) => { if (e.target.id === "otel-mask") closeOtelModal(); });

        loadApps();
    </script>
</body>
</html>
