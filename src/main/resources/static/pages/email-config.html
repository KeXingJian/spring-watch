<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>邮箱配置 - spring-watch</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/common.js"></script>
    <style>
        body { margin: 0; }
        .shell { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }
        .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .toolbar .right { margin-left: auto; }
        .panel { background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 14px; }
        .panel-head { padding: 10px 14px; border-bottom: 1px solid var(--c-border); font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; }
        .panel-body { padding: 0; }
        .test-bar { padding: 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--c-border); background: var(--c-info-light); }
        .test-bar input { flex: 1; padding: 6px 10px; border: 1px solid var(--c-border); border-radius: var(--radius-sm); font-size: 0.85rem; }
        .test-result { padding: 10px 14px; font-size: 0.85rem; display: none; }
        .test-result.ok { background: #dcfce7; color: #166534; }
        .test-result.fail { background: #fee2e2; color: #991b1b; }
        table.data { font-size: 0.82rem; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 0.8rem; color: var(--c-text-secondary); margin-bottom: 4px; }
        .form-row.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row input.form, .form-row select.form { width: 100%; box-sizing: border-box; }
        .required { color: var(--c-danger); }
        .hint { color: var(--c-text-muted); font-size: 0.78rem; margin-top: 4px; }
        .empty-state { padding: 30px 20px; text-align: center; color: var(--c-text-muted); font-size: 0.9rem; }
        td code { background: #f1f5f9; padding: 1px 6px; border-radius: 3px; font-size: 0.78rem; }
    </style>
</head>
<body>
    <div class="shell">
        <div class="toolbar">
            <button class="btn btn-primary" id="btn-new">+ 新建收件人</button>
            <span class="right"></span>
            <button class="btn" id="btn-refresh">刷新</button>
        </div>

        <div class="panel">
            <div class="panel-head">测试邮件连通性 <span class="tag" style="margin-left:auto;font-size:0.74rem;color:var(--c-text-muted);">用配置的 SMTP 发件,确认通道正常</span></div>
            <div class="test-bar">
                <input id="test-to" placeholder="输入测试收件人地址,支持多个(逗号分隔)">
                <button class="btn btn-primary btn-sm" id="btn-test">发送测试</button>
            </div>
            <div class="test-result" id="test-result"></div>
        </div>

        <div class="panel">
            <div class="panel-head">收件人配置 <span class="tag" id="configs-count" style="margin-left:auto;font-size:0.74rem;color:var(--c-text-muted);">0 条</span></div>
            <table class="data">
                <thead>
                    <tr>
                        <th style="width:48px;">ID</th>
                        <th style="width:200px;">应用</th>
                        <th>收件人(target)</th>
                        <th style="width:80px;">状态</th>
                        <th style="width:140px;">创建时间</th>
                        <th style="width:180px;">操作</th>
                    </tr>
                </thead>
                <tbody id="configs-tbody">
                    <tr><td colspan="6" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 收件人编辑模态 -->
    <div class="modal-mask" id="edit-mask" style="display:none;">
        <div class="modal" style="width: 560px;">
            <div class="modal-head">
                <span id="edit-title">新建收件人</span>
                <span class="close" onclick="closeEdit()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <label>应用 <span class="required">*</span></label>
                    <select class="form" id="edit-appid"></select>
                </div>
                <div class="form-row">
                    <label>收件人(target) <span class="required">*</span> <span class="hint" style="display:inline;">多个地址用逗号分隔</span></label>
                    <input class="form" id="edit-target" placeholder="a@x.com,b@y.com">
                </div>
                <div class="form-row">
                    <label>状态</label>
                    <select class="form" id="edit-status">
                        <option value="enabled" selected>enabled</option>
                        <option value="disabled">disabled</option>
                    </select>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn" onclick="closeEdit()">取消</button>
                <button class="btn btn-primary" id="btn-save">保存</button>
            </div>
        </div>
    </div>

    <script>
        let apps = [];
        let configs = [];

        async function loadApps() {
            try {
                apps = await SW.api.get("/api/apps/active");
            } catch (e) { apps = []; }
            const sel = document.getElementById("edit-appid");
            sel.innerHTML = '<option value="">-- 请选择 --</option>' + apps.map(a =>
                '<option value="' + a.appid + '">' + SW.ui.escapeHtml(a.appName) + ' (' + a.appid + ')</option>'
            ).join("");
        }

        async function loadConfigs() {
            try {
                configs = await SW.api.get("/api/notification/configs");
                renderConfigs();
            } catch (e) {
                document.getElementById("configs-tbody").innerHTML = '<tr><td colspan="6" class="empty-state">加载失败: ' + SW.ui.escapeHtml(e.message) + '</td></tr>';
            }
        }

        function renderConfigs() {
            document.getElementById("configs-count").textContent = configs.length + " 条";
            if (configs.length === 0) {
                document.getElementById("configs-tbody").innerHTML = '<tr><td colspan="6" class="empty-state">暂无收件人,点击 [新建收件人] 开始</td></tr>';
                return;
            }
            document.getElementById("configs-tbody").innerHTML = configs.map(c => {
                const app = apps.find(a => a.appid === c.appid);
                const appLabel = app ? (app.appName + " (" + app.appid + ")") : ("appid=" + c.appid);
                return ''
                    + '<tr data-id="' + c.id + '">'
                    + '<td>' + c.id + '</td>'
                    + '<td>' + SW.ui.escapeHtml(appLabel) + '</td>'
                    + '<td><code>' + SW.ui.escapeHtml(c.target || "-") + '</code></td>'
                    + '<td><span class="badge badge-' + (c.status === "enabled" ? "active" : "paused") + '">' + SW.ui.escapeHtml(c.status || "-") + '</span></td>'
                    + '<td>' + SW.ui.escapeHtml(SW.ui.formatTime(c.createdAt) || "-") + '</td>'
                    + '<td><div style="display:flex;gap:4px;flex-wrap:wrap;">'
                    + '<button class="btn btn-sm" data-act="edit">编辑</button>'
                    + '<button class="btn btn-sm" data-act="del" style="color:var(--c-danger);">删除</button>'
                    + '</div></td>'
                    + '</tr>';
            }).join("");
        }

        function openEdit(id) {
            document.getElementById("edit-id").value = id || "";
            document.getElementById("edit-title").textContent = id ? "编辑收件人" : "新建收件人";
            if (id) {
                const c = configs.find(x => x.id === id);
                if (!c) { SW.ui.toast("配置不存在", "error"); return; }
                document.getElementById("edit-appid").value = c.appid || "";
                document.getElementById("edit-target").value = c.target || "";
                document.getElementById("edit-status").value = c.status || "enabled";
            } else {
                document.getElementById("edit-appid").value = "";
                document.getElementById("edit-target").value = "";
                document.getElementById("edit-status").value = "enabled";
            }
            document.getElementById("edit-mask").style.display = "flex";
            setTimeout(() => document.getElementById("edit-target").focus(), 50);
        }

        function closeEdit() { document.getElementById("edit-mask").style.display = "none"; }

        document.getElementById("btn-save").addEventListener("click", async () => {
            const id = document.getElementById("edit-id").value;
            const appid = document.getElementById("edit-appid").value;
            const target = document.getElementById("edit-target").value.trim();
            if (!appid) { SW.ui.toast("请选择应用", "error"); return; }
            if (!target) { SW.ui.toast("收件人不能为空", "error"); return; }
            const body = {
                appid: parseInt(appid, 10),
                target: target,
                status: document.getElementById("edit-status").value
            };
            try {
                if (id) {
                    await SW.api.put("/api/notification/configs/" + id, body);
                    SW.ui.toast("已更新", "success");
                } else {
                    await SW.api.post("/api/notification/configs", body);
                    SW.ui.toast("已创建", "success");
                }
                closeEdit();
                await loadConfigs();
            } catch (e) {
                SW.ui.toast("保存失败: " + e.message, "error");
            }
        });

        document.getElementById("configs-tbody").addEventListener("click", async (e) => {
            const btn = e.target.closest("button[data-act]");
            if (!btn) return;
            const tr = btn.closest("tr");
            const id = parseInt(tr.dataset.id, 10);
            const act = btn.dataset.act;
            if (act === "edit") openEdit(id);
            else if (act === "del") {
                if (!confirm("确定删除该收件人配置?")) return;
                try { await SW.api.del("/api/notification/configs/" + id); SW.ui.toast("已删除", "success"); await loadConfigs(); }
                catch (e) { SW.ui.toast("删除失败: " + e.message, "error"); }
            }
        });

        document.getElementById("btn-test").addEventListener("click", async () => {
            const to = document.getElementById("test-to").value.trim();
            if (!to) { SW.ui.toast("请输入收件人地址", "error"); return; }
            const resultEl = document.getElementById("test-result");
            resultEl.style.display = "block";
            resultEl.className = "test-result";
            resultEl.textContent = "发送中...";
            try {
                const r = await SW.api.post("/api/notification/test", null, { params: { to: to } });
                const ok = r.ok === true;
                resultEl.className = "test-result " + (ok ? "ok" : "fail");
                resultEl.textContent = (ok ? "✓ 发送成功 - " : "✗ 发送失败 - ") + (r.raw || "");
            } catch (e) {
                resultEl.className = "test-result fail";
                resultEl.textContent = "✗ 调用失败: " + e.message;
            }
        });

        document.getElementById("btn-new").addEventListener("click", () => openEdit(null));
        document.getElementById("btn-refresh").addEventListener("click", loadConfigs);
        document.getElementById("edit-mask").addEventListener("click", e => { if (e.target.id === "edit-mask") closeEdit(); });

        loadApps().then(loadConfigs);
    </script>
</body>
</html>
