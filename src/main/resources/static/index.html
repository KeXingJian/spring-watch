<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spring-watch 监控平台</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/common.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <h1>&#9889; spring-watch</h1>
            <span class="spacer"></span>
            <label style="font-size:0.8rem;opacity:0.8;">应用:</label>
            <select id="app-switcher"><option value="">加载中...</option></select>
            <span class="clock" id="topbar-clock">--:--:--</span>
        </header>
        <div class="shell-body">
            <nav class="sidenav">
                <a class="active" target="content" href="/pages/app-detail.html">
                    <span class="nav-icon">&#128202;</span>应用指标
                </a>
                <a target="content" href="javascript:void(0)" onclick="SW.ui.toast('日志分析待实现,见 docs/视图层规划_v1.md','info')">
                    <span class="nav-icon">&#128196;</span>日志分析
                </a>
                <a target="content" href="javascript:void(0)" onclick="SW.ui.toast('告警规则待实现','info')">
                    <span class="nav-icon">&#9888;</span>告警规则
                </a>
                <a target="content" href="javascript:void(0)" onclick="SW.ui.toast('告警历史待实现','info')">
                    <span class="nav-icon">&#128203;</span>告警历史
                </a>
                <a target="content" href="javascript:void(0)" onclick="SW.ui.toast('监控应用管理待实现','info')">
                    <span class="nav-icon">&#9881;</span>监控应用
                </a>
            </nav>
            <main class="main">
                <iframe name="content" src="/pages/app-detail.html"></iframe>
            </main>
        </div>
    </div>
    <script>
        (function () {
            // 应用切换器
            const sel = document.getElementById("app-switcher");
            function loadApps() {
                SW.api.get("/api/apps/active").then(apps => {
                    if (!apps || apps.length === 0) {
                        sel.innerHTML = '<option value="">暂无应用</option>';
                        return;
                    }
                    const current = SW.ctx.getQueryAppid() || localStorage.getItem("spring_watch.currentAppid") || (apps[0].appid || apps[0].id);
                    sel.innerHTML = '<option value="">--请选择应用--</option>' + apps.map(a => {
                        const id = a.appid || a.id;
                        return '<option value="' + id + '"' + (String(id) === String(current) ? ' selected' : '') + '>'
                            + SW.ui.escapeHtml(a.appName) + ' (' + id + ')</option>';
                    }).join("");
                    if (current && !localStorage.getItem("spring_watch.currentAppid")) {
                        localStorage.setItem("spring_watch.currentAppid", String(current));
                    }
                }).catch(err => {
                    sel.innerHTML = '<option value="">加载失败</option>';
                    SW.ui.toast("应用列表加载失败: " + err.message, "error");
                });
            }
            sel.addEventListener("change", () => {
                SW.ctx.setAppid(sel.value);
                const frame = document.querySelector("iframe[name=content]");
                if (frame && frame.contentWindow) {
                    const url = new URL(frame.src);
                    url.searchParams.set("appid", sel.value);
                    if (!sel.value) url.searchParams.delete("appid");
                    frame.src = url.toString();
                } else {
                    document.querySelector("iframe[name=content]").src = "/pages/app-detail.html" + (sel.value ? "?appid=" + sel.value : "");
                }
            });
            loadApps();
            window.addEventListener("sw:appid-changed", () => loadApps());

            // 顶栏时钟
            const clock = document.getElementById("topbar-clock");
            function tick() { clock.textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false }); }
            tick();
            setInterval(tick, 1000);
        })();
    </script>
</body>
</html>
