version: '3.8'

services:
  mock-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: mock-test:1.0.0
    container_name: mock-test
    ports:
      - "8081:8081"
      - "9464:9464"
    environment:
      - TZ=Asia/Shanghai
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=mock-test
      - OTEL_EXPORTER_PROMETHEUS_HOST=0.0.0.0
      - OTEL_EXPORTER_PROMETHEUS_PORT=9464
      - JAVA_OPTS=-Xmx512m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
