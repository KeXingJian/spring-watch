server:
  port: 8081

spring:
  application:
    name: mock-test
  datasource:
    url: jdbc:h2:mem:mocktest;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%5level] traceId=%mdc{trace_id:-} spanId=%mdc{span_id:-} %logger{36} - %msg%n"

mock:
  sim:
    enabled: true
    steady-interval-ms: 1000
    business-interval-ms: 8000
    stress-pool-burst-ms: 60000
    stress-slow-query-ms: 90000
    log-warn-burst-ms: 120000
    log-error-burst-ms: 300000
